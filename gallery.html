function load(){document.getElementById("wrap").innerHTML="<div class='spin-box'><div class='spin'></div><p>Loading revamps...</p></div>";fetch(SU).then(function(r){return r.text();}).then(function(txt){var s=txt.indexOf("setResponse(")+12;var e=txt.lastIndexOf(")");var j=JSON.parse(txt.substring(s,e));var rows=j.table.rows,recs=[];for(var i=rows.length-1;i>=0;i--){var row=rows[i],cv=row.c;function v(n){return cv&&cv[n]&&cv[n].v!=null?String(cv[n].v):"";}var d=cv&&cv[0]&&cv[0].v?pd(cv[0].v):null;if(!d||isNaN(d.getTime()))continue;recs.push({ts:d.toISOString(),sf:v(1),loc:v(2),sn:v(3),bf:di(v(5)),af:di(v(6)),p2:di(v(7)),p3:di(v(8)),p4:di(v(9)),p5:di(v(10)),p6:di(v(11)),st:v(12),nt:v(13)});}render(recs);}).catch(function(e){document.getElementById("wrap").innerHTML="<div class='err'>Could not load. Make sure the Google Sheet is set to Anyone with the link - Viewer.<br><br><small>"+e.message+"</small></div>";});}
